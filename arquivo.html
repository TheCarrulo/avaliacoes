<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arquivo de Testes — Agrupamento Afonso Paiva</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f5f2; --ink: #1a1814; --muted: #8a8580;
      --accent: #1a5fc8; --line: #e0ddd8; --card: #ffffff;
    }
    body {
      background: var(--bg); color: var(--ink);
      font-family: 'DM Mono', monospace; font-weight: 300;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 4rem 1.5rem 6rem;
    }
    header { width: 100%; max-width: 540px; margin-bottom: 3.5rem; opacity: 0; animation: fadeUp 0.6s ease forwards; }
    .logo-wrap { display: flex; align-items: center; gap: 1.1rem; margin-bottom: 1rem; }
    .logo-wrap img { width: 160px; height: auto; }
    .school { font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.25rem; }
    h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; font-weight: 400; line-height: 1.1; }
    h1 span { color: var(--accent); }
    .divider { width: 32px; height: 2px; background: var(--accent); margin-top: 1rem; }
    .back { display: inline-block; margin-top: 1rem; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-decoration: none; }
    .back:hover { color: var(--accent); }
    .list { width: 100%; max-width: 540px; display: flex; flex-direction: column; gap: 1px; }
    .item {
      background: var(--card); border: 1px solid var(--line);
      padding: 1.4rem 1.6rem; display: grid;
      grid-template-columns: auto 1px 1fr auto; align-items: stretch;
      gap: 1.2rem; opacity: 0; animation: fadeUp 0.5s ease forwards;
    }
    .sep { background: var(--line); }
    .item:first-child { border-radius: 6px 6px 0 0; }
    .item:last-child  { border-radius: 0 0 6px 6px; }
    .item:only-child  { border-radius: 6px; }
    .item:nth-child(1)  { animation-delay: 0.10s; }
    .item:nth-child(2)  { animation-delay: 0.18s; }
    .item:nth-child(3)  { animation-delay: 0.26s; }
    .item:nth-child(4)  { animation-delay: 0.34s; }
    .item:nth-child(5)  { animation-delay: 0.42s; }
    .item:nth-child(6)  { animation-delay: 0.50s; }
    .item:nth-child(7)  { animation-delay: 0.58s; }
    .item:nth-child(8)  { animation-delay: 0.66s; }
    .item:nth-child(9)  { animation-delay: 0.74s; }
    .item:nth-child(10) { animation-delay: 0.82s; }
    .date-block { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 48px; }
    .day-num { font-family: 'DM Serif Display', serif; font-size: 1.6rem; line-height: 1; color: var(--muted); }
    .month-str { font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
    .weekday { font-size: 0.5rem; letter-spacing: 0.08em; color: var(--muted); margin-top: 2px; }
    .info { display: flex; flex-direction: column; justify-content: center; }
    .subject { font-size: 0.85rem; letter-spacing: 0.04em; color: var(--muted); }
    .badge { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; border: 1px solid var(--line); color: var(--muted); padding: 3px 8px; border-radius: 20px; }
    .done-label { font-size: 0.6rem; letter-spacing: 0.08em; color: var(--muted); margin-top: 4px; text-align: center; }
    footer { margin-top: 3rem; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); opacity: 0; animation: fadeUp 0.5s ease 0.9s forwards; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 420px) { h1 { font-size: 1.7rem; } .item { padding: 1.1rem 1.2rem; gap: 1rem; } }
  </style>
</head>

<footer id="footer"></footer>

<script>
  const testes = [
    { dia: 12, mes: "maio", mesNum: 4, ano: 2026, semana: "ter\u00e7a-feira",  disciplina: "Portugu\u00eas" },
    { dia: 15, mes: "maio", mesNum: 4, ano: 2026, semana: "sexta-feira",        disciplina: "Ingl\u00eas"    },
    { dia: 21, mes: "maio", mesNum: 4, ano: 2026, semana: "quinta-feira",       disciplina: "Hist\u00f3ria"  },
    { dia: 27, mes: "maio", mesNum: 4, ano: 2026, semana: "quarta-feira",       disciplina: "Ci\u00eancias"  },
  ];

  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  const list = document.getElementById("list");

  const passados = testes
    .filter(t => new Date(t.ano, t.mesNum, t.dia) < hoje)
    .sort((a, b) => new Date(b.ano, b.mesNum, b.dia) - new Date(a.ano, a.mesNum, a.dia));

  passados.forEach(t => {
    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML =
      '<div class="date-block">' +
        '<div class="day-num">' + String(t.dia).padStart(2,"0") + '</div>' +
        '<div class="month-str">' + t.mes + '</div>' +
        '<div class="weekday">' + t.semana + '</div>' +
      '</div>' +
      '<div class="sep"></div>' +
      '<div class="info"><div class="subject">' + t.disciplina + '</div></div>' +
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;">' +
        '<div class="badge">Teste</div>' +
        '<div class="done-label">realizado</div>' +
      '</div>';
    list.appendChild(item);
  });

  if (passados.length === 0) {
    list.innerHTML = '<p style="color:var(--muted);font-size:0.75rem;letter-spacing:0.08em;padding:2rem 0">Nenhum teste realizado ainda.</p>';
  }

  const opts = { day: "2-digit", month: "long", year: "numeric" };
  document.getElementById("footer").textContent =
    "Atualizado em " + new Date().toLocaleDateString("pt-PT", opts);
</script>
